version: '3.8'

services:

  # ─────────────────────────────────────────────────────────
  # APIs de Negócio
  # ─────────────────────────────────────────────────────────
  apilancamentos:
    build:
      context: ./src/Presentation/ApiLancamentos
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres_lancamentos;Database=lancamentos;Username=fluxo;Password=fluxo123
      - RABBITMQ_HOST=messagebroker
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      postgres_lancamentos:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    networks:
      - fluxo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  apiconsolidado:
    build:
      context: ./src/Presentation/ApiConsolidado
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres_consolidado;Database=consolidado;Username=fluxo;Password=fluxo123
      - REDIS_CONNECTION=redis:6379
      - RABBITMQ_HOST=messagebroker
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      postgres_consolidado:
        condition: service_healthy
      redis:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    networks:
      - fluxo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  processadoreventos:
    build:
      context: ./src/WorkerServices/ProcessadorEventos
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres_consolidado;Database=consolidado;Username=fluxo;Password=fluxo123
      - REDIS_CONNECTION=redis:6379
      - RABBITMQ_HOST=messagebroker
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      messagebroker:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluxo-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # Bancos de Dados (isolados por domínio)
  # ─────────────────────────────────────────────────────────
  postgres_lancamentos:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lancamentos
      POSTGRES_USER: fluxo
      POSTGRES_PASSWORD: fluxo123
    volumes:
      - db_lancamentos_data:/var/lib/postgresql/data
    networks:
      - fluxo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxo -d lancamentos"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_consolidado:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: consolidado
      POSTGRES_USER: fluxo
      POSTGRES_PASSWORD: fluxo123
    volumes:
      - db_consolidado_data:/var/lib/postgresql/data
    networks:
      - fluxo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxo -d consolidado"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Cache Distribuído
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - fluxo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────────────────────
  messagebroker:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fluxo-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Observabilidade
  # ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - fluxo-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - fluxo-network
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - fluxo-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml
    networks:
      - fluxo-network
    depends_on:
      - jaeger
    restart: unless-stopped

volumes:
  db_lancamentos_data:
  db_consolidado_data:
  redis_data:
  rabbitmq_data:
  grafana_data:

networks:
  fluxo-network:
    driver: bridge

version: '3.8'

services:
  apilancamentos:
    build:
      context: ./src/Presentation/ApiLancamentos
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - messagebroker

  apiconsolidado:
    build:
      context: ./src/Presentation/ApiConsolidado
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - messagebroker

  processadoreventos:
    build:
      context: ./src/WorkerServices/ProcessadorEventos
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - messagebroker

  messagebroker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  db_lancamentos_data:
  db_consolidado_data:

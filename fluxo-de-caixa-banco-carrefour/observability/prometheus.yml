global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "lancamentos-api"
    static_configs:
      - targets: ["apilancamentos:8080"]
    metrics_path: /metrics

  - job_name: "consolidado-api"
    static_configs:
      - targets: ["apiconsolidado:8080"]
    metrics_path: /metrics

  - job_name: "processador-eventos"
    static_configs:
      - targets: ["processadoreventos:8080"]
    metrics_path: /metrics

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["messagebroker:15692"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
